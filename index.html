<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#0d3a1a">
  <title>FPL Draft Challenge 2025/26</title>
  <style>
:root {
  --pitch-dark: #0d3a1a;
  --pitch-light: #1a5c2e;
  --pitch-line: rgba(255, 255, 255, 0.15);
  --card-bg: #ffffff;
  --card-shadow: 0 12px 32px rgba(0, 0, 0, 0.25);
  --text-dark: #0f172a;
  --text-muted: #64748b;
  --valid-green: #16a34a;
  --invalid-red: #dc2626;
  --accent: #3b82f6;
  --accent-light: #60a5fa;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  background: linear-gradient(135deg, var(--pitch-dark) 0%, var(--pitch-light) 100%);
  color: var(--text-dark);
  min-height: 100vh;
  overflow-x: hidden;
}

.container {
  min-height: 100vh;
  padding: 16px;
  display: flex;
  flex-direction: column;
}

/* Header */
.header {
  text-align: center;
  margin-bottom: 24px;
  color: white;
  z-index: 50;
  position: relative;
}

.logo {
  font-size: 0.75rem;
  font-weight: 900;
  letter-spacing: 0.2em;
  color: rgba(255, 255, 255, 0.7);
  margin-bottom: 8px;
  text-transform: uppercase;
}

.header h1 {
  font-size: 1.75rem;
  margin: 0;
  font-weight: 900;
  margin-bottom: 4px;
}

.progress-badge {
  display: inline-block;
  background: rgba(255, 255, 255, 0.15);
  border: 1px solid rgba(255, 255, 255, 0.25);
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 0.85rem;
  font-weight: 700;
  margin-top: 12px;
  backdrop-filter: blur(8px);
}

/* Pitch */
.pitch {
  flex: 1;
  background: 
    radial-gradient(circle at 50% 0%, var(--pitch-line) 1px, transparent 1px),
    radial-gradient(circle at 50% 100%, var(--pitch-line) 1px, transparent 1px),
    linear-gradient(90deg, var(--pitch-line) 1px, transparent 1px),
    linear-gradient(0deg, var(--pitch-line) 1px, transparent 1px),
    linear-gradient(to right, var(--pitch-dark) 0%, var(--pitch-light) 50%, var(--pitch-dark) 100%);
  background-size: 100% 100%, 100% 100%, 100px 100%, 100% 60px, 100% 100%;
  background-position: 0 0, 0 100%, 0 0, 50% 0, 0 0;
  background-attachment: fixed;
  border-radius: 8px;
  padding: 12px;
  display: flex;
  flex-direction: column;
  justify-content: space-around;
  gap: 12px;
  position: relative;
  overflow: hidden;
  min-height: 600px;
}

/* Formation Row */
.formation-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(70px, 1fr));
  gap: 8px;
  justify-content: center;
  padding: 0 4px;
}

.formation-row.gk {
  grid-template-columns: 1fr;
  max-width: 90px;
  margin: 0 auto;
}

.formation-row.def,
.formation-row.mid {
  grid-template-columns: repeat(4, 1fr);
  max-width: 360px;
  margin: 0 auto;
  width: 100%;
}

.formation-row.fwd {
  grid-template-columns: repeat(2, 1fr);
  max-width: 180px;
  margin: 0 auto;
}

/* Player Card */
.player-card {
  aspect-ratio: 1;
  background: var(--card-bg);
  border: 2px solid transparent;
  border-radius: 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: var(--card-shadow);
  padding: 6px;
  text-align: center;
  min-height: 80px;
  position: relative;
  overflow: hidden;
}

.player-card.empty {
  background: rgba(255, 255, 255, 0.05);
  border-color: rgba(255, 255, 255, 0.1);
  color: rgba(255, 255, 255, 0.5);
}

.player-card.empty:hover {
  background: rgba(255, 255, 255, 0.08);
  transform: translateY(-2px);
  box-shadow: 0 16px 40px rgba(0, 0, 0, 0.3);
}

.player-card.filled {
  animation: fadeInScale 0.4s ease-out;
}

.player-card.valid {
  border-color: var(--valid-green);
  background: linear-gradient(135deg, rgba(22, 163, 74, 0.08), rgba(22, 163, 74, 0.04));
}

.player-card.invalid {
  border-color: var(--invalid-red);
  background: linear-gradient(135deg, rgba(220, 38, 38, 0.08), rgba(220, 38, 38, 0.04));
}

.player-card:hover:not(.empty) {
  transform: scale(1.08);
}

.player-card-content {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  width: 100%;
  font-size: 0.75rem;
  line-height: 1.2;
}

.player-badge {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--accent);
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 900;
  font-size: 0.6rem;
  flex-shrink: 0;
}

.player-name {
  font-weight: 700;
  color: var(--text-dark);
  min-height: 16px;
  line-height: 1.1;
}

.player-club {
  color: var(--text-muted);
  font-size: 0.65rem;
  line-height: 1;
}

.empty-text {
  font-size: 0.65rem;
  font-weight: 700;
}

.empty-icon {
  font-size: 1.5rem;
  opacity: 0.3;
  margin-bottom: 2px;
}

.card-status {
  position: absolute;
  top: 4px;
  right: 4px;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  font-size: 0.7rem;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-weight: 900;
}

.player-card.valid .card-status {
  background: var(--valid-green);
}

.player-card.invalid .card-status {
  background: var(--invalid-red);
}

/* Validation Message */
.validation-error {
  position: absolute;
  bottom: -18px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--invalid-red);
  color: white;
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 0.6rem;
  font-weight: 700;
  white-space: nowrap;
  pointer-events: none;
  opacity: 0;
}

.player-card.invalid .validation-error {
  opacity: 1;
  animation: slideUp 0.3s ease-out;
}

@keyframes slideUp {
  from {
    opacity: 0;
    transform: translate(-50%, 0);
  }
  to {
    opacity: 1;
    transform: translate(-50%, -18px);
  }
}

@keyframes fadeInScale {
  from {
    opacity: 0;
    transform: scale(0.85);
  }
  to {
    opacity: 1;
    transform: scale(1);
  }
}

@keyframes flip {
  0% {
    transform: rotateY(0deg);
    opacity: 1;
  }
  50% {
    opacity: 0;
  }
  100% {
    transform: rotateY(360deg);
    opacity: 1;
  }
}

.card-flip {
  animation: flip 0.7s ease-in-out;
}

/* Modal */
.modal-overlay {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0, 0, 0, 0.5);
  display: none;
  align-items: flex-end;
  justify-content: center;
  z-index: 100;
  animation: fadeIn 0.2s ease-out;
}

.modal-overlay.open {
  display: flex;
}

@keyframes fadeIn {
  from {
    opacity: 0;
  }
  to {
    opacity: 1;
  }
}

.modal {
  background: white;
  width: 100%;
  max-width: 100%;
  border-radius: 20px 20px 0 0;
  padding: 20px 16px;
  max-height: 85vh;
  overflow-y: auto;
  animation: slideUp 0.3s ease-out;
}

.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
  gap: 12px;
}

.modal-title {
  font-size: 1.1rem;
  font-weight: 900;
  margin: 0;
}

.modal-close {
  background: none;
  border: none;
  font-size: 1.5rem;
  cursor: pointer;
  color: var(--text-muted);
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0;
  flex-shrink: 0;
}

.search-input {
  width: 100%;
  padding: 12px 14px;
  border: 2px solid #e2e8f0;
  border-radius: 8px;
  font-size: 1rem;
  margin-bottom: 12px;
  transition: border-color 0.2s;
}

.search-input:focus {
  outline: none;
  border-color: var(--accent);
}

.search-results {
  display: grid;
  gap: 8px;
}

.search-result {
  background: #f8fafc;
  border: 1px solid #e2e8f0;
  border-radius: 8px;
  padding: 12px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  gap: 12px;
  align-items: center;
}

.search-result:hover {
  background: #f1f5f9;
  border-color: var(--accent);
  transform: translateX(4px);
}

.search-result-badge {
  width: 40px;
  height: 40px;
  border-radius: 8px;
  background: var(--accent);
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 900;
  font-size: 0.75rem;
  flex-shrink: 0;
}

.search-result-info {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.search-result-name {
  font-weight: 700;
  color: var(--text-dark);
}

.search-result-club {
  font-size: 0.85rem;
  color: var(--text-muted);
}

.no-results {
  text-align: center;
  padding: 32px 16px;
  color: var(--text-muted);
}

/* Actions */
.actions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-top: 20px;
  position: sticky;
  bottom: 0;
  background: linear-gradient(to top, rgba(13, 58, 26, 0.95), rgba(13, 58, 26, 0.8));
  padding: 12px 16px 16px;
  z-index: 40;
}

button {
  font: inherit;
  border: none;
  padding: 12px 16px;
  border-radius: 8px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  font-size: 0.9rem;
}

.btn-secondary {
  background: rgba(255, 255, 255, 0.1);
  color: white;
  border: 1px solid rgba(255, 255, 255, 0.2);
}

.btn-secondary:hover:not(:disabled) {
  background: rgba(255, 255, 255, 0.15);
  transform: translateY(-2px);
}

.btn-primary {
  background: linear-gradient(135deg, var(--accent), var(--accent-light));
  color: white;
  box-shadow: 0 8px 16px rgba(59, 130, 246, 0.3);
}

.btn-primary:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 12px 24px rgba(59, 130, 246, 0.4);
}

.btn-primary:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  box-shadow: none;
}

/* Results */
.results {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: white;
  z-index: 150;
  overflow-y: auto;
  animation: fadeIn 0.3s ease-out;
}

.results.show {
  display: flex;
  flex-direction: column;
}

.results-header {
  background: linear-gradient(135deg, var(--pitch-dark), var(--pitch-light));
  color: white;
  padding: 24px 16px;
  text-align: center;
}

.results-header h2 {
  font-size: 1.75rem;
  margin: 0;
  margin-bottom: 8px;
}

.results-subtext {
  opacity: 0.9;
  font-size: 0.9rem;
}

.results-content {
  padding: 20px 16px;
  flex: 1;
}

.reveal-list {
  display: grid;
  gap: 10px;
  margin-bottom: 24px;
}

.reveal-item {
  background: #f8fafc;
  border-radius: 8px;
  padding: 12px;
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 12px;
  align-items: center;
  border-left: 4px solid var(--accent);
}

.reveal-position {
  background: var(--accent);
  color: white;
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 6px;
  font-weight: 900;
  font-size: 0.7rem;
  flex-shrink: 0;
}

.reveal-info {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.reveal-name {
  font-weight: 700;
  color: var(--text-dark);
}

.reveal-club {
  font-size: 0.85rem;
  color: var(--text-muted);
}

.reveal-points {
  font-weight: 900;
  font-size: 1.2rem;
  color: var(--accent);
  min-width: 40px;
  text-align: right;
}

.score-summary {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  margin-bottom: 24px;
  background: linear-gradient(135deg, rgba(59, 130, 246, 0.08), rgba(96, 165, 250, 0.04));
  border-radius: 12px;
  padding: 16px;
  border: 1px solid rgba(59, 130, 246, 0.2);
}

.score-box {
  text-align: center;
}

.score-label {
  display: block;
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 4px;
}

.score-value {
  display: block;
  font-size: 1.5rem;
  font-weight: 900;
  color: var(--accent);
}

.score-value.grade {
  font-size: 2rem;
}

.results-footer {
  padding: 16px;
  display: grid;
  gap: 12px;
}

.btn-back {
  width: 100%;
  background: linear-gradient(135deg, var(--accent), var(--accent-light));
  color: white;
}

.hidden {
  display: none !important;
}

/* Responsive */
@media (max-width: 640px) {
  .header h1 {
    font-size: 1.4rem;
  }

  .pitch {
    min-height: 480px;
    gap: 10px;
    padding: 10px;
  }

  .player-card {
    min-height: 70px;
  }

  .formation-row.def,
  .formation-row.mid {
    max-width: 100%;
  }

  .actions {
    padding-bottom: 12px;
  }

  .modal {
    border-radius: 16px 16px 0 0;
  }
}

@media (min-width: 768px) {
  .pitch {
    min-height: 700px;
  }

  .player-card {
    min-height: 100px;
  }

  .modal-overlay {
    align-items: center;
  }

  .modal {
    border-radius: 12px;
    width: 90%;
    max-width: 500px;
    max-height: 80vh;
  }
}
  </style>
</head>

  {id:"gk_clean",position:"GK",positionGroup:"gk",label:"Goalkeeper with at least 8 clean sheets",test:p=>p.cleanSheets>=8,fail:"Needs ≥8 clean sheets"},

  {id:"fwd_outside",position:"FWD",positionGroup:"fwd",label:"Forward outside the traditional Big Six",test:p=>!["arsenal","chelsea","liverpool","man city","manchester city","man utd","manchester united","tottenham"].some(club=>p.club.toLowerCase().includes(club)),fail:"Outside Big Six only"}
];

const PERFECT_SCORE = 2116;
const STORAGE_KEY = "fpl-draft-2025-26-picks-v1";

let players = [];
let picks = {};
let currentPromptId = null;

const normalise = value => value.normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase().trim();

function loadPicks() {
  try {
    picks = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
  } catch {
    picks = {};
  }
}

function savePicks() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(picks));
}

function getPlayer(id) {
  return players.find(p => p.id === Number(id));
}

function getClubInitials(club) {
  return club.split(" ").map(w => w[0]).join("").substring(0, 2).toUpperCase();
}

function render() {
  // Clear formation rows
  document.getElementById("formation-gk").innerHTML = "";
  document.getElementById("formation-def").innerHTML = "";
  document.getElementById("formation-mid").innerHTML = "";
  document.getElementById("formation-fwd").innerHTML = "";

  PROMPTS.forEach(prompt => {
    const selected = getPlayer(picks[prompt.id]);
    const valid = selected ? prompt.test(selected) : false;
    const groupId = `formation-${prompt.positionGroup}`;
    const container = document.getElementById(groupId);

    const card = document.createElement("button");
    card.className = "player-card";
    if (selected) {
      card.classList.add("filled");
      if (valid) card.classList.add("valid");
      if (!valid) card.classList.add("invalid");
    } else {
      card.classList.add("empty");
    }

    if (selected) {
      const initials = getClubInitials(selected.club);
      card.innerHTML = `
        <div class="player-card-content">
          <div class="player-badge">${initials}</div>
          <div class="player-name">${escapeHtml(selected.name.split(" ").pop())}</div>
          <div class="player-club">${escapeHtml(selected.club.substring(0, 8))}</div>
        </div>
        ${!valid ? `<div class="validation-error">${prompt.fail}</div>` : ""}
        <div class="card-status">${valid ? "✓" : "!"}</div>
      `;
    } else {
      card.innerHTML = `
        <div class="empty-icon">+</div>
        <div class="empty-text">Choose<br>Player</div>
      `;
    }

    card.addEventListener("click", () => openSearchModal(prompt.id, prompt.label, prompt.position));
    container.appendChild(card);
  });

  updateProgress();
}

function escapeHtml(value) {
  return String(value).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c]));
}

function openSearchModal(promptId, label, position) {
  currentPromptId = promptId;
  document.getElementById("modalTitle").textContent = `Select ${position}`;
  document.getElementById("searchInput").placeholder = `Search ${position}s…`;
  document.getElementById("searchInput").value = "";
  document.getElementById("searchResults").innerHTML = "";
  document.getElementById("searchModal").classList.add("open");
  document.getElementById("searchInput").focus();
}

function closeSearchModal() {
  document.getElementById("searchModal").classList.remove("open");
  currentPromptId = null;
}

function performSearch(query) {
  const promptId = currentPromptId;
  const prompt = PROMPTS.find(p => p.id === promptId);
  const q = normalise(query);
  const results = document.getElementById("searchResults");

  if (q.length < 2) {
    results.innerHTML = '<div class="no-results">Type at least 2 letters</div>';
    return;
  }

  const used = new Set(Object.values(picks).map(Number));
  const matches = players.filter(p =>
    p.position === prompt.position &&
    !used.has(p.id) &&
    normalise(`${p.name} ${p.displayName} ${p.club}`).includes(q)
  ).slice(0, 8);

  if (!matches.length) {
    results.innerHTML = '<div class="no-results">No players found</div>';
    return;
  }

  results.innerHTML = matches.map(p => {
    const initials = getClubInitials(p.club);
    return `
      <button class="search-result" data-player-id="${p.id}">
        <div class="search-result-badge">${initials}</div>
        <div class="search-result-info">
          <div class="search-result-name">${escapeHtml(p.name)}</div>
          <div class="search-result-club">${escapeHtml(p.club)}</div>
        </div>
      </button>
    `;
  }).join("");

  results.querySelectorAll(".search-result").forEach(btn => {
    btn.addEventListener("click", () => {
      const playerId = Number(btn.dataset.playerId);
      selectPlayer(playerId);
    });
  });
}

function selectPlayer(playerId) {
  if (Object.values(picks).map(Number).includes(playerId)) {
    alert("That player has already been used.");
    return;
  }
  picks[currentPromptId] = playerId;
  savePicks();
  closeSearchModal();
  render();
}

function updateProgress() {
  const validCount = PROMPTS.filter(pr => {
    const player = getPlayer(picks[pr.id]);
    return player && pr.test(player);
  }).length;
  document.getElementById("progress").textContent = `${validCount} / ${PROMPTS.length}`;
  document.getElementById("revealBtn").disabled = validCount !== PROMPTS.length;
}

async function revealTeam() {
  const rows = PROMPTS.map(pr => ({pr, player: getPlayer(picks[pr.id])}));
  const revealList = document.getElementById("revealList");
  revealList.innerHTML = "";

  document.getElementById("results").classList.add("show");

  let totalScore = 0;

  for (let i = 0; i < rows.length; i++) {
    const {pr, player} = rows[i];
    const item = document.createElement("div");
    item.className = "reveal-item";
    item.innerHTML = `
      <div class="reveal-position">${pr.position}</div>
      <div class="reveal-info">
        <div class="reveal-name">${escapeHtml(player.name)}</div>
        <div class="reveal-club">${escapeHtml(player.club)}</div>
      </div>
      <div class="reveal-points" style="opacity:0">0</div>
    `;
    revealList.appendChild(item);

    // Flip animation + count
    await new Promise(resolve => setTimeout(resolve, 700));
    item.classList.add("card-flip");

    const pointsEl = item.querySelector(".reveal-points");
    pointsEl.style.opacity = "1";
    totalScore += player.points;

    // Count up animation
    const targetScore = player.points;
    const duration = 400;
    const start = Date.now();
    const animate = () => {
      const elapsed = Date.now() - start;
      const progress = Math.min(elapsed / duration, 1);
      pointsEl.textContent = Math.floor(targetScore * progress);
      if (progress < 1) {
        requestAnimationFrame(animate);
      } else {
        pointsEl.textContent = targetScore;
      }
    };
    animate();
  }

  // Final score display
  const efficiency = PERFECT_SCORE ? totalScore / PERFECT_SCORE * 100 : 0;
  let grade = "D";
  if (efficiency >= 95) grade = "A+";
  else if (efficiency >= 90) grade = "A";
  else if (efficiency >= 82) grade = "B";
  else if (efficiency >= 72) grade = "C";

  document.getElementById("totalScore").textContent = totalScore;
  document.getElementById("efficiency").textContent = `${efficiency.toFixed(1)}%`;
  document.getElementById("grade").textContent = grade;
}

// Event Listeners
document.getElementById("resetBtn").addEventListener("click", () => {
  if (confirm("Clear all 11 selections?")) {
    picks = {};
    savePicks();
    document.getElementById("results").classList.remove("show");
    render();
  }
});

document.getElementById("revealBtn").addEventListener("click", revealTeam);

document.getElementById("closeModalBtn").addEventListener("click", closeSearchModal);

document.getElementById("searchInput").addEventListener("input", e => {
  performSearch(e.target.value);
});

document.getElementById("backBtn").addEventListener("click", () => {
  document.getElementById("results").classList.remove("show");
  render();
});

document.getElementById("searchModal").addEventListener("click", e => {
  if (e.target === document.getElementById("searchModal")) {
    closeSearchModal();
  }
});

// Initialize
(async function init() {
  players = EMBEDDED_PLAYERS;
  loadPicks();
  render();
})().catch(err => {
  console.error(err);
});
  </script>
