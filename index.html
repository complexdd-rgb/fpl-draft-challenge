<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#07162f">
  <title>FPL Draft Challenge #2</title>
  <style>
:root{
  --navy:#07162f;
  --blue:#1e73ff;
  --blue2:#4aa3ff;
  --card:#ffffff;
  --bg:#eef4ff;
  --text:#14213d;
  --muted:#68738a;
  --good:#168a4a;
  --good-bg:#e9f8ef;
  --bad:#c93434;
  --bad-bg:#fff0f0;
  --border:#d8e2f2;
  font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}
*{box-sizing:border-box}
body{margin:0;background:linear-gradient(180deg,var(--navy) 0 320px,var(--bg) 320px);color:var(--text);min-height:100vh}
.shell{width:min(980px,calc(100% - 28px));margin:0 auto;padding:42px 0 72px}
.hero{color:#fff;text-align:center;margin-bottom:28px}
.eyebrow{font-size:.78rem;font-weight:800;letter-spacing:.16em;color:#86bdff}
h1{font-size:clamp(2rem,6vw,4rem);line-height:1;margin:.4rem 0 1rem}
.hero p{margin:0 auto;max-width:620px;color:#d8e8ff;font-size:1.04rem}
.status-row{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-top:20px}
.status-row span{background:rgba(255,255,255,.11);border:1px solid rgba(255,255,255,.18);padding:8px 12px;border-radius:999px;font-size:.9rem}
.challenge-grid{display:grid;gap:14px}
.challenge-card{background:var(--card);border:2px solid transparent;border-radius:18px;padding:17px;box-shadow:0 10px 30px rgba(9,31,72,.08)}
.challenge-card.valid{border-color:var(--good);background:var(--good-bg)}
.challenge-card.invalid{border-color:var(--bad);background:var(--bad-bg)}
.challenge-card{position:relative}
.completion-tick{position:absolute;top:13px;right:13px;width:28px;height:28px;border-radius:50%;display:grid;place-items:center;background:var(--good);color:white;font-weight:900;font-size:1rem;box-shadow:0 4px 12px rgba(22,138,74,.25)}
.prompt-row{display:flex;gap:12px;align-items:flex-start;margin-bottom:12px}
.position{flex:0 0 auto;background:var(--navy);color:white;border-radius:9px;padding:6px 9px;font-size:.75rem;font-weight:800}
.prompt-text{font-weight:750;line-height:1.35}
.autocomplete{position:relative}
.player-input{width:100%;border:1px solid var(--border);border-radius:12px;padding:13px 42px 13px 14px;font-size:1rem;background:white;color:var(--text);outline:none}
.player-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(30,115,255,.14)}
.clear-button{position:absolute;right:7px;top:7px;width:32px;height:32px;border:0;border-radius:50%;background:#edf2fa;color:#4a5870;font-size:1.2rem;cursor:pointer}
.suggestions{position:absolute;z-index:20;left:0;right:0;top:calc(100% + 6px);background:white;border:1px solid var(--border);border-radius:12px;box-shadow:0 15px 35px rgba(9,31,72,.18);overflow:hidden}
.suggestion{width:100%;display:flex;justify-content:space-between;gap:12px;text-align:left;padding:12px 14px;border:0;border-bottom:1px solid #edf1f7;background:white;cursor:pointer}
.suggestion:last-child{border-bottom:0}
.suggestion:hover,.suggestion.active{background:#edf5ff}
.suggestion strong{font-size:.95rem}
.suggestion span{font-size:.85rem;color:var(--muted)}
.feedback{min-height:20px;margin:9px 2px 0;font-size:.88rem;color:var(--muted)}
.valid .feedback{color:var(--good);font-weight:700}
.invalid .feedback{color:var(--bad);font-weight:700}
.actions{display:flex;gap:12px;justify-content:center;margin:26px 0}
button{font:inherit}
.primary,.secondary{border:0;border-radius:12px;padding:13px 20px;font-weight:800;cursor:pointer}
.primary{background:linear-gradient(135deg,var(--blue),var(--blue2));color:white;box-shadow:0 8px 20px rgba(30,115,255,.28)}
.primary:disabled{opacity:.45;cursor:not-allowed;box-shadow:none}
.secondary{background:white;color:var(--text);border:1px solid var(--border)}
.results{background:white;border-radius:20px;padding:22px;box-shadow:0 12px 36px rgba(9,31,72,.1)}
.hidden{display:none}
.revealed-team{display:grid;gap:8px;margin:18px 0}
.reveal-row{display:grid;grid-template-columns:64px 1fr auto;gap:10px;align-items:center;padding:11px 0;border-bottom:1px solid #edf1f7}
.reveal-row span:first-child{font-weight:800;color:var(--blue)}
.reveal-row strong:last-child{font-size:1.1rem}
.score-card{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:20px 0}
.score-card div{background:var(--bg);padding:15px;border-radius:12px;text-align:center}
.score-card span{display:block;font-size:.78rem;color:var(--muted);margin-bottom:5px}
.score-card strong{font-size:1.3rem}
.copy-status{color:var(--good);font-weight:700}
@media(max-width:640px){
  body{background:linear-gradient(180deg,var(--navy) 0 290px,var(--bg) 290px)}
  .shell{width:min(100% - 18px,980px);padding-top:28px}
  .score-card{grid-template-columns:repeat(2,1fr)}
  .actions{position:sticky;bottom:8px;z-index:10;background:rgba(238,244,255,.92);backdrop-filter:blur(8px);padding:8px;border-radius:16px}
  .actions button{flex:1}
}
</style>
</head>

    <section id="challengeGrid" class="challenge-grid" aria-live="polite"></section>

    <section class="actions">

let players = [];
let picks = {};
let activeSuggestion = {};

const normalise = value => value.normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase().trim();

function loadPicks(){
  try { picks = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
  catch { picks = {}; }
}

function savePicks(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(picks));
}

function getPlayer(id){
  return players.find(p => p.id === Number(id));
}

function render(){
  const grid = document.getElementById("challengeGrid");
  grid.innerHTML = "";
  PROMPTS.forEach((prompt,index)=>{
    const selected = getPlayer(picks[prompt.id]);
    const valid = selected ? prompt.test(selected) : false;
    const card = document.createElement("article");
    card.className = "challenge-card" + (selected ? (valid ? " valid" : " invalid") : "");
    card.innerHTML = `
      ${valid ? '<span class="completion-tick" aria-label="Completed">✓</span>' : ''}
      <div class="prompt-row">
        <span class="position">${prompt.position}</span>
        <div class="prompt-text">${index+1}. ${prompt.label}</div>
      </div>
      <div class="autocomplete">
        <input class="player-input" data-prompt="${prompt.id}" autocomplete="off"
          aria-label="Player for ${prompt.label}"
          placeholder="Type at least 2 letters…"
          value="${selected ? escapeHtml(selected.name + " — " + selected.club) : ""}">
        ${selected ? `<button class="clear-button" data-clear="${prompt.id}" aria-label="Clear player">×</button>` : ""}
        <div class="suggestions hidden" id="suggestions-${prompt.id}"></div>
      </div>
      <p class="feedback">${selected ? (valid ? "Valid selection" : prompt.fail) : ""}</p>`;
    grid.appendChild(card);
  });
  wireInputs();
  updateProgress();
}

function escapeHtml(value){
  return String(value).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c]));
}

function wireInputs(){
  document.querySelectorAll(".player-input").forEach(input=>{
    input.addEventListener("input", e => onType(e.target));
    input.addEventListener("keydown", e => onKeyDown(e));
    input.addEventListener("focus", e => {
      if(!picks[e.target.dataset.prompt] && e.target.value.length >= 2) onType(e.target);
    });
  });
  document.querySelectorAll("[data-clear]").forEach(btn=>{
    btn.addEventListener("click",()=>{
      delete picks[btn.dataset.clear];
      savePicks();
      render();
    });
  });
}

function onType(input){
  const promptId = input.dataset.prompt;
  if(picks[promptId]) {
    delete picks[promptId];
    savePicks();
    render();
    requestAnimationFrame(()=>{
      const fresh = document.querySelector(`[data-prompt="${promptId}"]`);
      fresh.focus();
      fresh.value = input.value;
      showSuggestions(fresh);
    });
    return;
  }
  showSuggestions(input);
}

function showSuggestions(input){
  const promptId = input.dataset.prompt;
  const prompt = PROMPTS.find(p=>p.id===promptId);
  const box = document.getElementById(`suggestions-${promptId}`);
  const q = normalise(input.value);
  if(q.length < 2) {
    box.classList.add("hidden");
    box.innerHTML = "";
    return;
  }
  const used = new Set(Object.values(picks).map(Number));
  const matches = players.filter(p =>
    p.position === prompt.position &&
    !used.has(p.id) &&
    normalise(`${p.name} ${p.displayName} ${p.club}`).includes(q)
  ).slice(0,8);
  activeSuggestion[promptId] = -1;
  if(!matches.length) {
    box.innerHTML = `<div class="suggestion"><span>No matching players</span></div>`;
    box.classList.remove("hidden");
    return;
  }
  box.innerHTML = matches.map((p,i)=>`
    <button type="button" class="suggestion" data-player="${p.id}" data-index="${i}">
      <strong>${escapeHtml(p.name)}</strong><span>${escapeHtml(p.club)}</span>
    </button>`).join("");
  box.classList.remove("hidden");
  box.querySelectorAll("[data-player]").forEach(button=>{
    button.addEventListener("click",()=>selectPlayer(promptId, Number(button.dataset.player)));
  });
}

function onKeyDown(event){
  const input = event.target;
  const promptId = input.dataset.prompt;
  const box = document.getElementById(`suggestions-${promptId}`);
  const options = [...box.querySelectorAll("[data-player]")];
  if(box.classList.contains("hidden") || !options.length) return;
  if(event.key === "ArrowDown"){
    event.preventDefault();
    activeSuggestion[promptId] = Math.min((activeSuggestion[promptId] ?? -1)+1, options.length-1);
  } else if(event.key === "ArrowUp"){
    event.preventDefault();
    activeSuggestion[promptId] = Math.max((activeSuggestion[promptId] ?? 0)-1, 0);
  } else if(event.key === "Enter" && activeSuggestion[promptId] >= 0){
    event.preventDefault();
    options[activeSuggestion[promptId]].click();
    return;
  } else if(event.key === "Escape"){
    box.classList.add("hidden");
    return;
  } else {
    return;
  }
  options.forEach((o,i)=>o.classList.toggle("active",i===activeSuggestion[promptId]));
}

function selectPlayer(promptId, playerId){
  if(Object.values(picks).map(Number).includes(playerId)) {
    alert("That player has already been used.");
    return;
  }
  picks[promptId] = playerId;
  savePicks();
  render();
}

function updateProgress(){
  const validCount = PROMPTS.filter(pr => {
    const player = getPlayer(picks[pr.id]);
    return player && pr.test(player);
  }).length;
  document.getElementById("progress").textContent = `${validCount} / ${PROMPTS.length} valid`;
  document.getElementById("revealButton").disabled = validCount !== PROMPTS.length;
}

function formatTime(totalSeconds){
  const seconds = Math.max(0, Math.floor(totalSeconds));
  const minutes = Math.floor(seconds / 60);
  return `${minutes}:${String(seconds % 60).padStart(2,"0")}`;
}

function updateTimer(){
  const elapsed = completedSeconds ?? Math.floor((Date.now() - startedAt) / 1000);
  document.getElementById("timer").textContent = `Time ${formatTime(elapsed)}`;
}

function restartTimer(){
  startedAt = Date.now();
  completedSeconds = null;
  clearInterval(timerHandle);
  updateTimer();
  timerHandle = setInterval(updateTimer,1000);
}

function reveal(){
  const rows = PROMPTS.map(pr => ({pr,player:getPlayer(picks[pr.id])}));
  if(rows.some(x=>!x.player || !x.pr.test(x.player))){
    alert("Please complete all 11 valid selections before revealing your team.");
    render();
    return;
  }
  completedSeconds = Math.floor((Date.now() - startedAt) / 1000);
  clearInterval(timerHandle);
  updateTimer();
  const total = rows.reduce((sum,x)=>sum+x.player.points,0);
  const efficiency = PERFECT_SCORE ? total / PERFECT_SCORE * 100 : 0;
  let grade = "D";
  if(efficiency >= 95) grade = "A+";
  else if(efficiency >= 90) grade = "A";
  else if(efficiency >= 82) grade = "B";
  else if(efficiency >= 72) grade = "C";
  const team = document.getElementById("revealedTeam");
  team.innerHTML = rows.map(x=>`
    <div class="reveal-row">
      <span>${x.pr.position}</span>
      <div><strong>${escapeHtml(x.player.name)}</strong><br><small>${escapeHtml(x.player.club)}</small></div>
      <strong>${x.player.points}</strong>
    </div>`).join("");
  document.getElementById("totalScore").textContent = total;
  document.getElementById("perfectScore").textContent = PERFECT_SCORE;
  document.getElementById("efficiency").textContent = `${efficiency.toFixed(1)}%`;
  document.getElementById("grade").textContent = grade;
  document.getElementById("timeTaken").textContent = formatTime(completedSeconds);
  const oldBest = Number(localStorage.getItem(BEST_SCORE_KEY) || 0);
  const best = Math.max(oldBest,total);
  localStorage.setItem(BEST_SCORE_KEY,String(best));
  document.getElementById("bestScore").textContent = best;
  document.getElementById("results").classList.remove("hidden");
  document.getElementById("results").scrollIntoView({behavior:"smooth"});
}

document.getElementById("resetButton").addEventListener("click",()=>{
  if(confirm("Clear all 11 selections?")) {
    picks = {};
    savePicks();
    document.getElementById("results").classList.add("hidden");
    document.getElementById("copyStatus").textContent = "";
    restartTimer();
    render();
  }
});
document.getElementById("revealButton").addEventListener("click",reveal);
document.getElementById("copyButton").addEventListener("click",async()=>{
  const score = document.getElementById("totalScore").textContent;
  const efficiency = document.getElementById("efficiency").textContent;
  const grade = document.getElementById("grade").textContent;
  const time = document.getElementById("timeTaken").textContent;
  const grid = "🟩🟩🟩🟩🟩\n🟩🟩🟩🟩🟩\n🟩";
  const text = `🏆 FPL Draft Challenge #2\n\nScore: ${score} / ${PERFECT_SCORE}\nEfficiency: ${efficiency}\nGrade: ${grade}\nTime: ${time}\n\n${grid}\n\nCan you beat me?`;
  try {
    await navigator.clipboard.writeText(text);
    document.getElementById("copyStatus").textContent = "Result copied.";
  } catch {
    document.getElementById("copyStatus").textContent = text;
  }
});
document.addEventListener("click",e=>{
  if(!e.target.closest(".autocomplete")) document.querySelectorAll(".suggestions").forEach(x=>x.classList.add("hidden"));
});

(function init(){
  players = EMBEDDED_PLAYERS;
  if(!Array.isArray(players) || !players.length) throw new Error("Embedded player database contains no players");
  document.getElementById("databaseStatus").textContent = `${players.length} official FPL players loaded`;
  document.getElementById("perfectScore").textContent = PERFECT_SCORE;
  document.getElementById("bestScore").textContent = Number(localStorage.getItem(BEST_SCORE_KEY) || 0);
  restartTimer();
  loadPicks();
  // Remove saved selections that no longer exist in the official database.
  Object.keys(picks).forEach(key => { if(!getPlayer(picks[key])) delete picks[key]; });
  savePicks();
  render();
})();// init

window.addEventListener("error", err=>{
  document.getElementById("databaseStatus").textContent = "Player database failed to load";
  console.error(err);
});
</script>
